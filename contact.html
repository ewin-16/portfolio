<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
opacity:0;
animation:fadeIn 1s forwards;
transition:opacity 0.6s;
}

body.fade-out{
opacity:0;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

h1{
font-size:50px;
}

p{
font-size:20px;
color:#bbb;
}

.menu{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
}

.menu a{
color:white;
margin:0 30px;
text-decoration:none;
font-size:18px;
}

.menu a:hover{
color:#00ffff;
}

</style>

</head>

<body>
<centre>
<h1>Contact Me</h1>
</centre>
<p>Email: ewin@example.com</p>
<p>Phone: +91 XXXXX XXXXX</p>

<div class="menu">

<a href="index.html">Home</a>
<a href="projects.html">Projects</a>

<a href="resume.html">Resume</a>

</div>
<script>
document.querySelectorAll("a").forEach(link=>{
link.addEventListener("click",function(e){

if(link.href){
e.preventDefault();

document.body.classList.add("fade-out");

setTimeout(()=>{
window.location=link.href;
},600);
}

});
});
</script>
</body>
</html>
